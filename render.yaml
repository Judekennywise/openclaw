services:
  - type: web
    name: openclaw
    env: image
    image:
      url: ghcr.io/openclaw/openclaw:latest
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_DEV
        value: "true" # Forces automatic workspace/config generation on missing environments
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
