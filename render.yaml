services:
  - type: web
    name: openclaw
    env: image
    image:
      url: ghcr.io/openclaw/openclaw:2026.6.8-beta.1-browser
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_FLAGS
        value: "--allow-unconfigured" # Safely injects the setup-bypass flag to the binary
      - key: OPENCLAW_GATEWAY_MODE
        value: "local"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
