services:
  - type: web
    name: openclaw
    env: image
    image:
      url: ghcr.io/openclaw/openclaw:2026.6.8-beta.1-browser # If you are using your own registry image, replace this URL
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080" # Render requires a PORT variable telling it where traffic goes
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
