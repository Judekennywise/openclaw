services:
  - type: web
    name: openclaw
    runtime: docker
    dockerfilePath: ./Dockerfile-render
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_MODE
        value: "local"
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: NVIDIA_API_KEY
        value: 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
